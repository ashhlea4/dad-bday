<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forever & Always 🤍</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius+Swash+Caps&display=swap" rel="stylesheet">
</head>
<script>
const btn = document.getElementById("celebrate");

btn.addEventListener("click", () => {
  document.body.classList.toggle("party");
});
</script>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="password-card">
    <h2>Forever & Always 🤍</h2>
    <p>Enter the date that started it all</p>

    <input type="password" id="password-input" placeholder="MMDDYYYY">
    <button id="unlock">Unlock</button>

    <p id="error-message"></p>
  </div>
</div>
<div id="main-site" style="display:none;"> 
  <div class="timeline">
    <div class="center-circle">
      <div class="couple-names">Joyce & James</div>
      <h2>1998 → 2026</h2>
      <p id="subtitle">28 Years of Love</p>
      <button id="celebrate">Celebrate 🎂</button>
    </div>

    <!-- 28 PHOTOS -->
    <div class="photo" style="--i:0;"><img src="images/1.JPG"></div>
    <div class="photo" style="--i:1;"><img src="images/2.JPG"></div>
    <div class="photo" style="--i:2;"><img src="images/3.JPG"></div>
    <div class="photo" style="--i:3;"><img src="images/4-1.JPG"></div>
    <div class="photo" style="--i:4;"><img src="images/4.JPG"></div>
    <div class="photo" style="--i:5;"><img src="images/5.JPG"></div>
    <div class="photo" style="--i:6;"><img src="images/6.JPG"></div>
    <div class="photo" style="--i:7;"><img src="images/7-1.JPG"></div>
    <div class="photo" style="--i:8;"><img src="images/7.JPG"></div>
    <div class="photo" style="--i:9;"><img src="images/8.JPG"></div>
    <div class="photo" style="--i:10;"><img src="images/9.JPG"></div>
    <div class="photo" style="--i:11;"><img src="images/10.JPG"></div>
    <div class="photo" style="--i:12;"><img src="images/11.JPG"></div>
    <div class="photo" style="--i:13;"><img src="images/12-1.JPG"></div>
    <div class="photo" style="--i:14;"><img src="images/12.JPG"></div>
    <div class="photo" style="--i:15;"><img src="images/13.JPG"></div>
    <div class="photo" style="--i:16;"><img src="images/14-1.JPG"></div>
    <div class="photo" style="--i:17;"><img src="images/14-2.JPG"></div>
    <div class="photo" style="--i:18;"><img src="images/14.JPG"></div>
    <div class="photo" style="--i:19;"><img src="images/15.JPG"></div>
    <div class="photo" style="--i:20;"><img src="images/16.JPG"></div>
    <div class="photo" style="--i:21;"><img src="images/17.JPG"></div>
    <div class="photo" style="--i:22;"><img src="images/18-1.JPG"></div>
    <div class="photo" style="--i:23;"><img src="images/18.JPG"></div>
    <div class="photo" style="--i:24;"><img src="images/19.JPG"></div>
    <div class="photo" style="--i:25;"><img src="images/20.JPG"></div>
    <div class="photo" style="--i:26;"><img src="images/21.JPG"></div>
    <div class="photo" style="--i:27;"><img src="images/22.JPG"></div>
  </div>

  <div class="photo-preview">
    <img id="previewImg" src="" alt="">
    <button class="close-preview">×</button>
  </div>

  <div class="rings-wrapper">
    <div class="ring ring-left">
      <div class="diamond"></div>
    </div>
    <div class="ring ring-right">
      <div class="diamond"></div>
    </div>
    <p class="rings-text">Forever & Always 🤍</p>
  </div>

  <div class="golf-wrapper">

    <div class="golf-photo-container">
      <img src="images/golf.png" alt="Mom and Dad golfing">

      <div class="putting-green">
        <div class="hole"></div>
        <div class="golf-ball"></div>
        <div class="golf-club"></div>
      </div>

    </div>

    <p class="golf-message">golf is life</p>

  </div>

  <div class="balloons"></div>

  <audio id="weddingSong" loop>
    <source src="wedding.mp3" type="audio/mpeg">
  </audio>

  <audio id="birthdaySong" loop>
    <source src="birthday.mp3" type="audio/mpeg">
  </audio>

  <div class="envelope-wrapper">
    <div class="envelope">

      <div class="flap"></div>

      <div class="seal"></div>

      <div class="letter">
        <p id="typedText"></p>
      </div>

    </div>
  </div>

  <div class="cake-wrapper">
    <div class="cake-photo">
      <img src="cake.png" alt="Birthday Cake">

      <div class="flame flame-5"></div>
      <div class="flame flame-8"></div>

    </div>
  </div>

  <audio id="paperSound">
    <source src="paper.mp3" type="audio/mpeg">
  </audio>

</div> 

<script src="script.js"></script>

</body>
</html>
